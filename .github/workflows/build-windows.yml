name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # กด run ด้วยตนเองได้

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller pillow reportlab

      - name: Convert PNG icon to ICO
        run: |
          python - <<'EOF'
          from PIL import Image
          img = Image.open("assets/logo/App_Logo.png").convert("RGBA")
          sizes = [(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)]
          img.save("assets/logo/AppIcon.ico", format="ICO", sizes=sizes)
          print("ICO created")
          EOF

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller `
            --name "DesktopQC" `
            --onefile `
            --windowed `
            --icon "assets/logo/AppIcon.ico" `
            --add-data "assets;assets" `
            --hidden-import PIL `
            --hidden-import PIL.Image `
            --hidden-import PIL.ImageTk `
            --hidden-import reportlab `
            --hidden-import reportlab.pdfbase.ttfonts `
            --hidden-import reportlab.pdfbase.pdfmetrics `
            --hidden-import reportlab.platypus `
            --hidden-import reportlab.lib.pagesizes `
            --hidden-import reportlab.lib.units `
            --hidden-import reportlab.lib.colors `
            --hidden-import reportlab.lib.styles `
            --noconfirm `
            main.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: DesktopQC-Windows
          path: dist/DesktopQC.exe
          retention-days: 30
